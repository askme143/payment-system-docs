name: payment-system-payments

services:
  payments-mongo:
    image: mongo:7
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --port
      - ${PAYMENTS_MONGO_PORT:-27117}
    ports:
      - "${PAYMENTS_MONGO_PORT:-27117}:${PAYMENTS_MONGO_PORT:-27117}"
    volumes:
      - payments-mongo-data:/data/db
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet --port ${PAYMENTS_MONGO_PORT:-27117} --eval "db.adminCommand('ping').ok"
      interval: 2s
      timeout: 2s
      retries: 30

  payments-mongo-rs-init:
    image: mongo:7
    depends_on:
      payments-mongo:
        condition: service_healthy
    restart: "no"
    command:
      - mongosh
      - mongodb://payments-mongo:${PAYMENTS_MONGO_PORT:-27117}/admin
      - --quiet
      - --eval
      - |
        try {
          const status = rs.status();
          print("replica set already initialized: " + status.set);
        } catch (error) {
          rs.initiate({
            _id: "rs0",
            members: [{ _id: 0, host: "localhost:${PAYMENTS_MONGO_PORT:-27117}" }]
          });
          print("replica set initialized: rs0");
        }

volumes:
  payments-mongo-data:

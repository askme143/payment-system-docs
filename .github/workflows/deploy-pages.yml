name: Deploy static documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p public/diagrams
          cp ./*.html public/
          cp ./.nojekyll public/
          cp diagrams/*.d2 public/diagrams/
          cp diagrams/*.svg public/diagrams/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-payment-docs:
    name: Deploy payment-docs.bookend.tech
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Tekton deployment
        env:
          TEKTON_WEBHOOK_TOKEN: ${{ secrets.TEKTON_WEBHOOK_TOKEN }}
        run: |
          curl --fail-with-body -X POST "https://tekton-api.bookend.tech/payment-system-docs/webhook" \
            -H "Authorization: Bearer ${TEKTON_WEBHOOK_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"git-revision":"main"}'
